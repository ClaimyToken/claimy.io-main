<div *ngIf="isOpen$ | async" class="login-modal-backdrop" (click)="close()">
  <div class="login-modal__card card" role="dialog" aria-modal="true" aria-label="Sign in with Phantom"
    (click)="$event.stopPropagation()">
    <button type="button" class="login-modal__dismiss" aria-label="Close" (click)="close()">×</button>
    <div class="card-body p-3 p-md-4">
      <app-login-form variant="modal"></app-login-form>
    </div>
  </div>
</div>
