<header class="login-page-header border-primary border rounded-3 my-3 my-lg-4">
  <h1 class="login-page-title text-center mb-0">
    <ngx-typed-js [strings]="['LOGIN']" [typeSpeed]="100" [startDelay]="0" [showCursor]="false">
      <span class="typing"></span>
    </ngx-typed-js>
  </h1>
</header>

<div class="row my-3 my-lg-4">
  <div class="col-12 col-lg-7 mx-auto">
    <div class="card">
      <div class="card-body p-3 p-md-4">
        <app-login-form variant="page"></app-login-form>
      </div>
    </div>
  </div>
</div>
