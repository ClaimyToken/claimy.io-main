<div class="card">
    <div class="card-body p-3 p-lg-4">
        <h3 class="h3 fw-bold text-white mb-2 text-center text-uppercase">Calculator</h3>

        <form class="w-100 mt-4">
            <p class="text-muted mb-1">Enter USD Value:</p>
            <mat-form-field class="w-100" appearance="fill">
                <input matInput #USDValue type="number" min="1" placeholder="1" class="mb-0">
            </mat-form-field>

            <p class="text-muted mb-1">Receive:</p>
            <div
                class="form-control d-flex flex-row justify-content-between align-items-center py-3 px-3 mb-3 border-0">
                <p class="mb-0">1,000 $Claimy</p>
                <p class="mb-0 text-muted">$98.00</p>
            </div>

            <p class="text-muted mb-1">Claimable after 6 hours:</p>
            <div
                class="form-control d-flex flex-row justify-content-between align-items-center py-3 px-3 mb-2 border-0">
                <p class="mb-0">+25 $Claimy</p>
                <p class="mb-0 text-muted">$5.02</p>
            </div>



            <p class="text-muted mb-0 mt-0 small">
                *Estimated claimable amount based on current calculations and simulations.
            </p>
        </form>
    </div>
</div>
