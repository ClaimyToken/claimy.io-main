<div mat-dialog-actions class="position-absolute top-0 mt-2 me-2 end-0">
    <button mat-icon-button class="rounded-circle" mat-dialog-close>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
            <g fill="currentColor">
                <path
                    d="M14.7,1.3c-0.4-0.4-1-0.4-1.4,0L8,6.6L2.7,1.3c-0.4-0.4-1-0.4-1.4,0s-0.4,1,0,1.4L6.6,8l-5.3,5.3 c-0.4,0.4-0.4,1,0,1.4C1.5,14.9,1.7,15,2,15s0.5-0.1,0.7-0.3L8,9.4l5.3,5.3c0.2,0.2,0.5,0.3,0.7,0.3s0.5-0.1,0.7-0.3 c0.4-0.4,0.4-1,0-1.4L9.4,8l5.3-5.3C15.1,2.3,15.1,1.7,14.7,1.3z">
                </path>
            </g>
        </svg>
    </button>
</div>

<h3 class="h3 c-text-glow text-primary mb-1 fw-bold text-uppercase text-center mt-3">Mint NFT</h3>
<p class="text-center mb-0">Mint your own $Claimy NFT</p>

<div mat-dialog-content>
    <form class="w-100 mt-2">
        <p class="text-muted mb-1">Quantity (Max: 10):</p>
        <mat-form-field class="w-100" appearance="fill">
            <input matInput #NFTquantity type="number" min="1" max="10" placeholder="1" class="mb-0">
        </mat-form-field>

        <p class="text-muted mb-1">Total Cost:</p>
        <div class="form-control d-flex flex-row justify-content-between align-items-center py-3 px-3 mb-3 border-0">
            <p class="mb-0">0.55 ETH</p>
            <p class="mb-0 text-muted">$1200.00</p>
        </div>
        <div class="d-flex align-items-center justify-content-center">
            <button mat-flat-button color="primary" class="py-3 px-4 mt-2 fw-bold text-uppercase text-center">MINT
                NOW</button>
        </div>

    </form>



</div>
