# Netlify: Angular app (output is dist/claimy per angular.json)
#
# Build runs scripts/inject-env-prod.cjs before ng build when NETLIFY=true (see scripts/inject-env-prod.cjs).
# Do NOT put private Solana RPC URLs (e.g. Shyft api_key) in Netlify env for the frontend — they would ship in
# main.*.js. Use public mainnet in the browser; set Shyft only as Supabase Edge secret SOLANA_RPC_URL.
# Optional Netlify overrides: CLAIMY_SPL_MINT, CLAIMY_SUPABASE_URL, CLAIMY_SUPABASE_ANON_KEY
#
[build]
  command = "npm run build"
  publish = "dist/claimy"

# Use a supported Node for Angular 16 (Netlify defaults vary)
[build.environment]
  NODE_VERSION = "18"

# Angular SPA: direct visits / refreshes to /home, /playhouse, etc. must serve index.html
# (Netlify serves real files first; this only applies when no matching file exists.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
